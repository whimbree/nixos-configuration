# sops recipient policy.
#
# Each secrets file is encrypted to the public keys listed in its matching
# creation_rule. Replace the REPLACE_ME placeholders below with the real
# age public keys (the "age1..." strings), then encrypt secrets with `sops`.
#
#   admin     -> your personal key (~/.config/sops/age/keys.txt), for editing
#   recovery  -> offline last-resort key, kept in secure cloud storage only
#   megakill  -> ssh-to-age of megakill's /etc/ssh/ssh_host_ed25519_key.pub
#   bastion   -> ssh-to-age of bastion's /etc/ssh/ssh_host_ed25519_key.pub;
#                used to decrypt secrets/microvm-key-seed.yaml on the host so it
#                can derive every MicroVM's age key (see docs/sops-microvm-key-image.md)
#
# Per-MicroVM secrets (secrets/bastion/<vm>.yaml) are managed automatically: the
# block between the sops-sync-recipients markers below is generated from the VMs
# flagged `sops = true` in bastion/vm-registry.nix. Do not edit it by hand. After
# adding/removing such a VM, run:
#   ./scripts/sops-sync-recipients
# which derives each VM's key from the microvm key seed, rewrites that block, and
# re-keys the secret files. Everything outside the markers is hand-written.

keys:
  - &admin     age1l94tfly00cenuvq84a420hegyd9rfa2dscrqq28mx8xpwv8fq4aqcrwfzn
  - &recovery  age1szsm74r0we0x08vkj6h4sxumv9ntvjpzy245k7cvf25wrf4jtegqlheu44
  - &megakill  age1a8xvjlqu8n8tfnyeazszjpczmlc6rnz37nnax8an6w0ddsnplpdqwjh8ge
  # ssh-to-age of wheatley's host key:
  #   ssh-keyscan -t ed25519 wheatley | grep ssh-ed25519 | awk '{print $2,$3}' | ssh-to-age
  - &wheatley  age1rpxvumqc4rpj6eyt7n0f7qc4uugawtpetsm79cl4ensxlzpz5cqq07x7jh
  # ssh-to-age of bastion's host key: run on bastion:
  #   ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
  - &bastion   age1ywl4keey3yytwurq70p608et9mxv7dhqwa2srsuf35qps7cp0v5shkmtqw

creation_rules:
  - path_regex: secrets/megakill\.yaml$
    key_groups:
      - age:
          - *admin
          - *recovery
          - *megakill

  - path_regex: secrets/wheatley\.yaml$
    key_groups:
      - age:
          - *admin
          - *recovery
          - *wheatley

  # MicroVM key seed: decryptable by you, the offline recovery key, and bastion
  # (so the host can derive each VM's key at deploy time).
  - path_regex: secrets/microvm-key-seed\.yaml$
    key_groups:
      - age:
          - *admin
          - *recovery
          - *bastion

  # Per-MicroVM secrets. Generated by ./scripts/sops-sync-recipients -- do not edit.
# >>> sops-sync-recipients: managed block (do not edit by hand) >>>
  # fluxer: derived key (sops-vm-pubkey fluxer)
  - path_regex: secrets/bastion/fluxer\.yaml$
    key_groups:
      - age:
          - *admin
          - *recovery
          - *bastion
          - age1u5eqqltknq3lv5m3hvcu494pkg8pxqhpzcr83wwuk8yyxrfv035qcugzap
  # gateway: derived key (sops-vm-pubkey gateway)
  - path_regex: secrets/bastion/gateway\.yaml$
    key_groups:
      - age:
          - *admin
          - *recovery
          - *bastion
          - age1ql7ujulw2s23h37djffqpsagk235t0st0k2leq3nfr7lrap3cgwsngd3dw
  # webrtc: derived key (sops-vm-pubkey webrtc)
  - path_regex: secrets/bastion/webrtc\.yaml$
    key_groups:
      - age:
          - *admin
          - *recovery
          - *bastion
          - age14xssfuv4puh3k50lcf5p9xpn7ql2973duzqcz8hts4s0az97s9tqxmmcdt
# <<< sops-sync-recipients: managed block <<<
